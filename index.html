<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学習ノート</title>
  <link rel="manifest" href="study-note-manifest.webmanifest" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #070707;
      --panel: #101010;
      --panel-2: #151515;
      --line: #313131;
      --line-soft: #222;
      --text: #f2f2f2;
      --muted: #9a9a9a;
      --dim: #656565;
      --danger: #ff4d4d;
      --ok: #cfcfcf;
      --focus: #ffffff;
      --shadow: 0 0 0 1px #252525, 0 20px 60px rgba(0, 0, 0, .45);
      --radius: 16px;
      --rail: clamp(38px, 5.4vw, 56px);
      --rail-button: clamp(30px, 4.4vw, 40px);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        linear-gradient(135deg, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 28px 28px,
        radial-gradient(circle at 80% 10%, #161616 0, transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      letter-spacing: .02em;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: var(--rail) minmax(320px, 1fr);
      min-height: 100svh;
      overflow-x: hidden;
    }

    .app.sidebar-collapsed {
      grid-template-columns: var(--rail) minmax(320px, 1fr);
    }

    .sidebar {
      position: sticky;
      left: 0;
      top: 0;
      z-index: 20;
      width: var(--rail);
      min-height: 100svh;
      border-right: 1px solid transparent;
      background: transparent;
      backdrop-filter: none;
      padding: clamp(8px, 1.8vw, 12px) clamp(4px, 1vw, 8px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
      align-items: center;
      transition: padding .2s ease;
    }

    .app:not(.sidebar-collapsed) .sidebar {
      position: fixed;
      width: min(360px, calc(100vw - 28px));
      inset: 0 auto 0 0;
      padding: 18px;
      align-items: stretch;
      background: #101010;
      border-right: 1px solid var(--line);
      box-shadow: 10px 0 24px rgba(0, 0, 0, .28);
    }

    .app:not(.sidebar-collapsed)::after {
      content: none;
    }

    .app.sidebar-collapsed .sidebar {
      padding: clamp(8px, 1.8vw, 12px) clamp(4px, 1vw, 8px);
      align-items: center;
      overflow: hidden;
    }

    .sidebar-toggle {
      border: 1px solid var(--line);
      color: var(--text);
      background: #111;
      border-radius: 12px;
      width: var(--rail-button);
      height: var(--rail-button);
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .brand,
    .toolbar,
    .search,
    .note-list {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      min-width: 0 !important;
      min-height: 0 !important;
      overflow: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .app:not(.sidebar-collapsed) .brand,
    .app:not(.sidebar-collapsed) .toolbar,
    .app:not(.sidebar-collapsed) .search,
    .app:not(.sidebar-collapsed) .note-list {
      display: flex !important;
      width: auto !important;
      height: auto !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }

    .app:not(.sidebar-collapsed) .brand {
      display: block !important;
    }

    .app:not(.sidebar-collapsed) .toolbar {
      display: grid !important;
    }

    .app.sidebar-collapsed .brand,
    .app.sidebar-collapsed .toolbar,
    .app.sidebar-collapsed .search,
    .app.sidebar-collapsed .note-list {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      overflow: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .brand {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      background: linear-gradient(180deg, #141414, #0d0d0d);
      box-shadow: var(--shadow);
    }

    .brand-kicker {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand h1 {
      font-size: 20px;
      margin: 0;
      line-height: 1.2;
      letter-spacing: .08em;
    }

    .status-line {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .status-badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      background: #0b0b0b;
      color: var(--ok);
      white-space: nowrap;
    }

    .status-badge.unsaved {
      color: var(--danger);
      border-color: rgba(255, 77, 77, .55);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 44px;
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--line);
      color: var(--text);
      background: #111;
      border-radius: 12px;
      padding: 11px 12px;
      font-weight: 700;
      font-size: 13px;
      transition: border-color .15s ease, background .15s ease, transform .15s ease;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      display: grid;
      place-items: center;
    }

    .icon-btn img {
      width: 20px;
      height: 20px;
      display: block;
      filter: invert(1);
    }

    .icon-btn.primary img {
      filter: none;
    }

    .btn:hover {
      background: #181818;
      border-color: #555;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.primary {
      background: #f2f2f2;
      color: #050505;
      border-color: #fff;
    }

    .btn.danger {
      color: var(--danger);
      border-color: rgba(255, 77, 77, .45);
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0c0c0c;
      color: var(--text);
      padding: 12px 13px;
      outline: none;
    }

    .search:focus,
    input:focus,
    textarea:focus {
      border-color: var(--focus);
    }

    .note-list {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 3px;
    }

    .app:not(.sidebar-collapsed) .note-list {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(8, 8, 8, .84);
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .note-card {
      border: 1px solid var(--line-soft);
      background: #0e0e0e;
      border-radius: 14px;
      padding: 13px;
      display: grid;
      grid-template-columns: 74px 1fr 32px;
      gap: 8px;
      text-align: left;
      color: inherit;
      width: 100%;
      cursor: pointer;
    }

    .note-thumb {
      width: 74px;
      aspect-ratio: 1;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      background: #080808;
      overflow: hidden;
      grid-row: span 3;
      display: grid;
      place-items: center;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 10px;
    }

    .note-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .note-card:hover {
      border-color: #555;
      background: #141414;
    }

    .note-card.active {
      border-color: #fff;
      background: #191919;
    }

    .note-title {
      grid-column: 2;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-preview {
      grid-column: 2 / 4;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 55px;
    }

    .note-meta {
      grid-column: 2 / 4;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 10px;
      border-top: 1px solid var(--line-soft);
      padding-top: 8px;
    }

    .note-delete {
      grid-column: 3;
      grid-row: 1;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 77, 77, .4);
      border-radius: 10px;
      background: #111;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .note-delete img {
      width: 16px;
      height: 16px;
      filter: invert(1);
      display: block;
    }

    .note-delete:hover {
      border-color: rgba(255, 77, 77, .8);
      background: #1a1010;
    }

    .note-card .note-title,
    .note-card .note-preview,
    .note-card .note-meta {
      min-width: 0;
    }

    .main {
      grid-column: 2;
      min-width: 320px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(14, 14, 14, .9);
      box-shadow: var(--shadow);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tab {
      border: 1px solid var(--line);
      background: #0d0d0d;
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      font-weight: 800;
    }

    .tab.active {
      color: #050505;
      background: #f1f1f1;
      border-color: #fff;
    }

    .document {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(13, 13, 13, .93);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .editor,
    .preview {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .hidden {
      display: none !important;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #080808;
      color: var(--text);
      padding: 13px 14px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: none;
      overflow: hidden;
      line-height: 1.7;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .image-stage {
      border: 1px dashed #444;
      border-radius: 15px;
      padding: 12px;
      background: #090909;
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--dim);
      overflow: hidden;
    }

    .image-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .upload-btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #111;
      color: var(--text);
      min-height: 48px;
      padding: 0 14px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
    }

    .file-input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .image-gallery {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .image-item {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #111;
      overflow: hidden;
    }

    .image-gallery img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      cursor: zoom-in;
    }

    .image-hide {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 8, 8, .88);
      color: var(--text);
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .image-hide:hover {
      border-color: #666;
      background: #181818;
    }

    .image-stage img {
      max-width: 100%;
      max-height: 520px;
      border-radius: 10px;
      display: block;
      border: 1px solid var(--line);
      background: #111;
    }

    .preview-head {
      display: grid;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    .preview-title {
      margin: 0;
      font-size: clamp(26px, 5vw, 56px);
      line-height: 1.1;
      letter-spacing: .05em;
    }

    .preview-time {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 12px;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .analysis-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 15px;
      background: #0b0b0b;
      min-height: 160px;
    }

    .analysis-card h3 {
      margin: 0 0 10px;
      font-family: var(--mono);
      font-size: 13px;
      color: #fff;
      letter-spacing: .08em;
    }

    .analysis-card p {
      margin: 0;
      color: #d6d6d6;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .empty {
      color: var(--dim);
      font-family: var(--mono);
      font-size: 12px;
    }

    .footer-hud {
      border-top: 1px solid var(--line);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      background: #080808;
      flex-wrap: wrap;
    }

    .google-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .google-actions button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #111;
      color: var(--text);
      padding: 5px 10px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 800;
    }

    .google-actions button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, .88);
    }

    .lightbox img {
      max-width: min(96vw, 1400px);
      max-height: 92svh;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #080808;
    }

    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #111;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
    }

    .confirm-modal {
      position: fixed;
      inset: 0;
      z-index: 110;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, .72);
    }

    .confirm-panel {
      width: min(360px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #101010;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .confirm-message {
      margin: 0;
      line-height: 1.7;
      color: var(--text);
      font-weight: 700;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: var(--rail) minmax(320px, 1fr);
      }

      .app.sidebar-collapsed {
        grid-template-columns: var(--rail) minmax(320px, 1fr);
      }

      .sidebar {
        max-height: none;
      }

      .app.sidebar-collapsed .sidebar {
        max-height: none;
      }

      .main {
        padding: 14px;
      }

      .topbar,
      .grid-2,
      .analysis-grid {
        grid-template-columns: 1fr;
      }

      .mode-tabs {
        justify-content: stretch;
      }

      .tab {
        flex: 1;
      }
    }

    @media (max-width: 520px) {
      .app {
        grid-template-columns: var(--rail) minmax(320px, 1fr);
      }

      .app.sidebar-collapsed {
        grid-template-columns: var(--rail) minmax(320px, 1fr);
      }

      .app:not(.sidebar-collapsed) .sidebar {
        width: min(300px, calc(100vw - 28px));
        padding: 12px;
      }

      .toolbar {
        grid-template-columns: 44px;
      }

      .image-controls {
        grid-template-columns: 1fr;
      }

      .editor,
      .preview {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle notes">&lt;</button>
      <section class="brand">
        <div class="brand-kicker">
          <span>STUDY NOTE SYSTEM</span>
          <span id="clock">--:--:--</span>
        </div>
        <div class="status-line">
          <span id="currentDate">----/--/--</span>
          <span id="saveStatus" class="status-badge">保存済</span>
        </div>
      </section>

      <div class="toolbar">
        <button class="btn primary icon-btn" id="newBtn" title="新規ノート" aria-label="新規ノート">
          <img src="https://icooon-mono.com/i/icon_00105/icon_001050.svg" alt="" />
        </button>
      </div>

      <div class="note-list" id="noteList"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="brand-kicker">
            <span id="updatedAt">最終更新: --</span>
          </div>
        </div>

        <div class="mode-tabs">
          <button class="btn icon-btn edit-only" id="saveBtn" title="保存" aria-label="保存">
            <img src="https://icooon-mono.com/i/icon_15148/icon_151480.svg" alt="" />
          </button>
          <button class="btn danger icon-btn edit-only" id="deleteBtn" title="削除" aria-label="削除">
            <img src="https://icooon-mono.com/i/icon_00055/icon_000550.svg" alt="" />
          </button>
        </div>
      </header>

      <section class="document">
        <form class="editor" id="editor">

          <div class="image-controls">
            <div class="field">
              <label for="imageUrlInput">外部URL / 画像URL</label>
              <input id="imageUrlInput" type="url" placeholder="https://x.com/user/status/123 または画像URL" />
            </div>
            <label class="upload-btn" for="fileInput">UPLOAD
              <input class="file-input" id="fileInput" type="file" accept="image/*" multiple />
            </label>
          </div>

          <div class="image-stage" id="imageStage">
            画像URLを入力するとここに表示されます
          </div>
          <div class="empty" id="imageStatus"></div>

          <div class="grid-2">
            <div class="field">
              <label for="firstImpressionInput">第一印象</label>
              <textarea id="firstImpressionInput" placeholder="最初に目に入ったもの、感情、印象の強さなど"></textarea>
            </div>

            <div class="field">
              <label for="compositionInput">構図 / レイアウトの分析</label>
              <textarea id="compositionInput" placeholder="視線誘導、余白、重心、主役と脇役、画面分割など"></textarea>
            </div>

            <div class="field">
              <label for="colorInput">配色 / 明暗の分析</label>
              <textarea id="colorInput" placeholder="色数、コントラスト、明度差、彩度、光源、見やすさなど"></textarea>
            </div>

            <div class="field">
              <label for="otherInput">その他</label>
              <textarea id="otherInput" placeholder="気づいたこと、真似したい点、次に試すことなど"></textarea>
            </div>
          </div>
        </form>

        <div class="footer-hud">
          <span>LOCAL STORAGE: ACTIVE</span>
          <span>NOTES: <span id="noteCount">0</span></span>
          <span class="google-actions">
            <button type="button" id="googleAuthBtn">GOOGLE LOGIN</button>
            <span id="googleStatus">GOOGLE: NOT CONFIGURED</span>
          </span>
        </div>
      </section>
    </main>
  </div>

  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="閉じる">×</button>
    <img id="lightboxImage" alt="" />
  </div>

  <div class="confirm-modal hidden" id="confirmModal" role="dialog" aria-modal="true">
    <div class="confirm-panel">
      <p class="confirm-message" id="confirmMessage"></p>
      <div class="confirm-actions">
        <button class="btn" id="confirmCancel" type="button">キャンセル</button>
        <button class="btn danger" id="confirmOk" type="button">削除</button>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

      <script>
    const STORAGE_KEY = "study-note-hud-v1";
    const SIDEBAR_COLLAPSED_KEY = "study-note-sidebar-collapsed";
    const MAX_IMAGES = 4;
    const URL_RESOLVE_DELAY = 450;
    const GOOGLE_CLIENT_ID = "993349074276-15jbv2cked8q3uo8ln4rcnoep6gvlb5s.apps.googleusercontent.com";
    const GOOGLE_DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";

    const els = {
      app: document.getElementById("app"),
      sidebarToggle: document.getElementById("sidebarToggle"),
      clock: document.getElementById("clock"),
      currentDate: document.getElementById("currentDate"),
      saveStatus: document.getElementById("saveStatus"),
      noteList: document.getElementById("noteList"),
      newBtn: document.getElementById("newBtn"),
      saveBtn: document.getElementById("saveBtn"),
      deleteBtn: document.getElementById("deleteBtn"),
      editOnly: Array.from(document.querySelectorAll(".edit-only")),
      editor: document.getElementById("editor"),
      updatedAt: document.getElementById("updatedAt"),
      noteCount: document.getElementById("noteCount"),
      imageUrl: document.getElementById("imageUrlInput"),
      fileInput: document.getElementById("fileInput"),
      imageStage: document.getElementById("imageStage"),
      imageStatus: document.getElementById("imageStatus"),
      firstImpression: document.getElementById("firstImpressionInput"),
      composition: document.getElementById("compositionInput"),
      color: document.getElementById("colorInput"),
      other: document.getElementById("otherInput"),
      lightbox: document.getElementById("lightbox"),
      lightboxImage: document.getElementById("lightboxImage"),
      lightboxClose: document.getElementById("lightboxClose"),
      googleAuthBtn: document.getElementById("googleAuthBtn"),
      googleStatus: document.getElementById("googleStatus"),
      confirmModal: document.getElementById("confirmModal"),
      confirmMessage: document.getElementById("confirmMessage"),
      confirmCancel: document.getElementById("confirmCancel"),
      confirmOk: document.getElementById("confirmOk")
    };

    let notes = normalizeNotes(loadNotes());
    let activeId = notes[0]?.id ?? null;
    let dirty = false;
    let mode = "edit";
    let imageResolveToken = 0;
    let imageResolveTimer = 0;
    let googleTokenClient = null;
    let googleAccessToken = "";
    let pendingGoogleSave = false;
    let googleSyncTimer = 0;
    let googleSyncInFlight = false;
    let confirmResolver = null;
    let cleanNotesJson = JSON.stringify(notes);

    function uid() {
      return "note-" + Date.now().toString(36);
    }

    function nowISO() {
      return new Date().toISOString();
    }

    function formatDate(value) {
      if (!value) return "--";
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function getFixedTitle(note) {
      return formatDate(note?.createdAt);
    }

    function loadNotes() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function normalizeNotes(items) {
      return items.map(note => {
        const images = Array.isArray(note.images) ? note.images : [];
        const migrated = images.length > 0
          ? images
          : [note.resolvedImageUrl, note.imageUrl].filter(Boolean).slice(0, 1).map(url => ({
              source: note.imageUrl || url,
              resolved: url,
              type: "remote"
            }));

        return {
          ...note,
          title: note.title ?? "",
          imageUrl: note.imageUrl ?? "",
          resolvedImageUrl: note.resolvedImageUrl ?? "",
          images: migrated.slice(0, MAX_IMAGES)
        };
      });
    }

    function persistNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      cleanNotesJson = JSON.stringify(notes);
    }

    function restoreCleanNotes() {
      try {
        notes = normalizeNotes(JSON.parse(cleanNotesJson));
      } catch {
        notes = normalizeNotes(loadNotes());
        cleanNotesJson = JSON.stringify(notes);
      }
      dirty = false;
      imageResolveToken += 1;
      clearTimeout(imageResolveTimer);
      updateSaveStatus();
    }

    function getNoteTitle(note) {
      return getFixedTitle(note);
    }

    function createNote() {
      const date = nowISO();
      const note = {
        id: uid(),
        title: "",
        imageUrl: "",
        resolvedImageUrl: "",
        images: [],
        firstImpression: "",
        composition: "",
        color: "",
        other: "",
        createdAt: date,
        updatedAt: date
      };

      notes.unshift(note);
      activeId = note.id;
      dirty = false;
      persistNotes();
      switchMode("edit");
      render();
    }

    function getActiveNote() {
      return notes.find(note => note.id === activeId) ?? null;
    }

    function askConfirm(message, okText = "OK") {
      els.confirmMessage.textContent = message;
      els.confirmOk.textContent = okText;
      els.confirmModal.classList.remove("hidden");
      els.confirmCancel.focus();

      return new Promise(resolve => {
        confirmResolver = resolve;
      });
    }

    function closeConfirm(value) {
      if (!confirmResolver) return;
      const resolve = confirmResolver;
      confirmResolver = null;
      els.confirmModal.classList.add("hidden");
      resolve(value);
    }

    function readForm() {
      const note = getActiveNote();
      if (!note) return null;

      const updated = {
        ...note,
        imageUrl: els.imageUrl.value.trim(),
        firstImpression: els.firstImpression.value.trim(),
        composition: els.composition.value.trim(),
        color: els.color.value.trim(),
        other: els.other.value.trim()
      };
      updated.title = getNoteTitle(updated);
      return updated;
    }

    async function saveNote() {
      const updated = readForm();
      if (!updated) return;

      updated.updatedAt = nowISO();
      notes = notes.map(note => note.id === updated.id ? updated : note);
      notes.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      activeId = updated.id;
      dirty = false;
      persistNotes();
      switchMode("edit");
      render();
      await syncToGoogleDrive();
    }

    async function deleteNote() {
      if (!activeId) return;
      if (!await askConfirm("このノートを削除しますか？", "削除")) return;

      notes = notes.filter(note => note.id !== activeId);
      activeId = notes[0]?.id ?? null;
      dirty = false;
      persistNotes();
      scheduleGoogleSync();

      if (!activeId) createNote();
      else {
        switchMode("edit");
        render();
      }
    }

    async function deleteNoteById(noteId) {
      if (!noteId) return;
      if (!await askConfirm("このノートを削除しますか？", "削除")) return;

      notes = notes.filter(note => note.id !== noteId);
      if (activeId === noteId) activeId = notes[0]?.id ?? null;
      dirty = false;
      persistNotes();
      scheduleGoogleSync();

      if (!activeId) createNote();
      else render();
    }

    function markDirty() {
      dirty = true;
      updateSaveStatus();
      renderImageStage(getActiveNote());
      scheduleGoogleSync();
    }

    function updateSaveStatus() {
      els.saveStatus.textContent = dirty ? "Unsaved" : "Saved";
      els.saveStatus.classList.toggle("unsaved", dirty);
    }

    function updateClock() {
      const now = new Date();

      els.clock.textContent = new Intl.DateTimeFormat("ja-JP", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).format(now);

      els.currentDate.textContent = new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        weekday: "short"
      }).format(now);
    }

    function getPreviewText(note) {
      const text = [
        note.firstImpression,
        note.composition,
        note.color,
        note.other
      ].filter(Boolean).join(" / ");

      return text || "No content yet.";
    }

    function isLikelyImageUrl(url) {
      return /^data:image\//i.test(url) || /\.(avif|bmp|gif|jpe?g|png|svg|webp)(\?.*)?$/i.test(url);
    }

    function uniqueUrls(urls) {
      return Array.from(new Set(urls.filter(Boolean))).slice(0, MAX_IMAGES);
    }

    function getDisplayImageUrls(note) {
      const fromImages = Array.isArray(note?.images)
        ? note.images.map(image => image.resolved || image.url || image.source)
        : [];
      return uniqueUrls(fromImages.length ? fromImages : [note?.resolvedImageUrl, note?.imageUrl]);
    }

    function getTwitterStatusId(url) {
      const match = url.match(/(?:twitter\.com|x\.com|fxtwitter\.com|fixupx\.com)\/[^/]+\/status(?:es)?\/(\d{2,20})/i);
      return match?.[1] ?? "";
    }

    function pickTwitterMediaUrls(status) {
      const media = status?.media ?? {};
      const urls = [
        ...(media.photos ?? []).map(item => item.url),
        ...(media.videos ?? []).map(item => item.thumbnail_url),
        media.external?.thumbnail_url,
        ...(media.all ?? []).map(item => item.url || item.thumbnail_url)
      ];

      return uniqueUrls(urls);
    }

    async function resolveTwitterImageUrls(url) {
      const statusId = getTwitterStatusId(url);
      if (!statusId) return [];

      const response = await fetch("https://api.fxtwitter.com/2/status/" + statusId);
      if (!response.ok) throw new Error("twitter media request failed");

      const data = await response.json();
      return pickTwitterMediaUrls(data.status);
    }

    async function resolveImageUrls(url) {
      if (!url) return [];
      if (isLikelyImageUrl(url)) return [url];

      if (getTwitterStatusId(url)) {
        return resolveTwitterImageUrls(url);
      }

      const endpoint = "https://api.microlink.io/?url=" + encodeURIComponent(url);
      const response = await fetch(endpoint);
      if (!response.ok) throw new Error("metadata request failed");

      const data = await response.json();
      return uniqueUrls([data?.data?.image?.url, data?.data?.screenshot?.url]);
    }

    function setActiveImages(source, urls, type = "remote") {
      const note = getActiveNote();
      if (!note) return;

      const cleaned = uniqueUrls(urls);
      note.imageUrl = type === "remote" ? source : "";
      note.resolvedImageUrl = cleaned[0] ?? "";
      note.images = cleaned.map((url, index) => ({
        source: type === "file" ? `upload-${index + 1}` : source,
        resolved: url,
        type
      }));
    }

    function hideActiveImage(url) {
      const note = getActiveNote();
      if (!note) return;

      note.images = (note.images ?? []).filter(image => (image.resolved || image.url || image.source) !== url);
      note.resolvedImageUrl = note.images[0]?.resolved ?? "";
      dirty = true;
      updateSaveStatus();
      renderImageStage(note);
      renderNoteList();
    }

    function renderImages(container, urls, emptyText) {
      container.innerHTML = "";

      if (urls.length === 0) {
        container.textContent = emptyText;
        return;
      }

      const gallery = document.createElement("div");
      gallery.className = "image-gallery";

      urls.forEach((url, index) => {
        const item = document.createElement("div");
        item.className = "image-item";

        const img = document.createElement("img");
        img.src = url;
        img.alt = `Note image ${index + 1}`;
        img.loading = "lazy";
        img.onerror = () => { img.remove(); };
        img.addEventListener("click", () => openLightbox(url, img.alt));
        item.appendChild(img);

        const hideButton = document.createElement("button");
        hideButton.className = "image-hide";
        hideButton.type = "button";
        hideButton.title = "非表示";
        hideButton.setAttribute("aria-label", "画像を非表示");
        hideButton.textContent = "×";
        hideButton.addEventListener("click", event => {
          event.stopPropagation();
          hideActiveImage(url);
        });
        item.appendChild(hideButton);

        gallery.appendChild(item);
      });

      container.appendChild(gallery);
    }

    function openLightbox(url, alt) {
      els.lightboxImage.src = url;
      els.lightboxImage.alt = alt;
      els.lightbox.classList.remove("hidden");
    }

    function closeLightbox() {
      els.lightbox.classList.add("hidden");
      els.lightboxImage.removeAttribute("src");
    }

    function renderNoteList() {
      els.noteList.innerHTML = "";

      notes.forEach(note => {
        const card = document.createElement("div");
        card.className = "note-card" + (note.id === activeId ? " active" : "");
        card.role = "button";
        card.tabIndex = 0;
        card.innerHTML = `
          <div class="note-thumb"></div>
          <div class="note-title"></div>
          <button class="note-delete" type="button" title="削除" aria-label="削除">
            <img src="https://icooon-mono.com/i/icon_00055/icon_000550.svg" alt="" />
          </button>
          <div class="note-preview"></div>
          <div class="note-meta"><span></span><span></span></div>
        `;

        const thumb = card.querySelector(".note-thumb");
        const title = getNoteTitle(note);
        const urls = getDisplayImageUrls(note);
        card.querySelector(".note-title").textContent = title;
        card.querySelector(".note-preview").textContent = getPreviewText(note);
        card.querySelector(".note-meta span:first-child").textContent = formatDate(note.updatedAt);
        card.querySelector(".note-meta span:last-child").textContent = urls.length ? `IMG ${urls.length}` : "TEXT";

        if (urls.length) {
          const img = document.createElement("img");
          img.src = urls[0];
          img.alt = title;
          img.loading = "lazy";
          img.onerror = () => { thumb.textContent = "NO IMG"; };
          thumb.appendChild(img);
        } else {
          thumb.textContent = "TEXT";
        }

        const openNote = async () => {
          if (dirty) {
            if (!await askConfirm("未保存の変更を破棄して移動しますか？", "移動")) return;
            restoreCleanNotes();
          }

          activeId = note.id;
          dirty = false;
          switchMode("edit");
          render();
        };

        card.querySelector(".note-delete").addEventListener("click", event => {
          event.stopPropagation();
          deleteNoteById(note.id);
        });

        card.addEventListener("click", openNote);
        card.addEventListener("keydown", event => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          openNote();
        });

        els.noteList.appendChild(card);
      });

      if (notes.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "ノートがありません。";
        els.noteList.appendChild(empty);
      }

      els.noteCount.textContent = String(notes.length);
    }

    function writeForm(note) {
      els.imageUrl.value = note?.imageUrl ?? "";
      els.fileInput.value = "";
      els.firstImpression.value = note?.firstImpression ?? "";
      els.composition.value = note?.composition ?? "";
      els.color.value = note?.color ?? "";
      els.other.value = note?.other ?? "";
      resizeTextareas();
    }

    function resizeTextarea(textarea) {
      textarea.style.height = "auto";
      textarea.style.height = `${textarea.scrollHeight}px`;
    }

    function resizeTextareas() {
      [els.firstImpression, els.composition, els.color, els.other].forEach(resizeTextarea);
    }

    function renderImageStage(note) {
      const urls = getDisplayImageUrls(note);
      renderImages(els.imageStage, urls, "Image preview");
      els.imageStatus.textContent = urls.length ? `${urls.length} / ${MAX_IMAGES} images` : "";
    }

    function scheduleImageResolve() {
      clearTimeout(imageResolveTimer);
      markDirty();
      imageResolveTimer = setTimeout(resolveCurrentUrlImages, URL_RESOLVE_DELAY);
    }

    async function resolveCurrentUrlImages() {
      const url = els.imageUrl.value.trim();
      const token = ++imageResolveToken;
      els.imageStatus.textContent = "";

      if (!url) {
        setActiveImages("", []);
        renderImageStage(getActiveNote());
        updatePreview();
        renderNoteList();
        return;
      }

      els.imageStage.textContent = "Loading images...";

      try {
        const urls = await resolveImageUrls(url);
        if (token !== imageResolveToken) return;

        setActiveImages(url, urls);
        renderImageStage(getActiveNote());

        if (urls.length === 0) {
          els.imageStage.textContent = getTwitterStatusId(url)
            ? "Twitter/Xの画像を取得できませんでした。画像付き投稿か確認してください。"
            : "Image could not be found.";
        } else if (getTwitterStatusId(url)) {
          els.imageStatus.textContent = `Twitter/Xから${urls.length}枚の画像を取得しました`;
        } else if (!isLikelyImageUrl(url)) {
          els.imageStatus.textContent = "リンク先から画像を取得しました";
        }
      } catch {
        if (token !== imageResolveToken) return;
        setActiveImages(url, []);
        els.imageStage.textContent = getTwitterStatusId(url)
          ? "Twitter/Xの画像を取得できませんでした。"
          : "Image could not be loaded.";
      }

      updatePreview();
      renderNoteList();
      scheduleGoogleSync();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handleFileUpload() {
      const files = Array.from(els.fileInput.files ?? []).filter(file => file.type.startsWith("image/")).slice(0, MAX_IMAGES);
      if (files.length === 0) return;

      dirty = true;
      updateSaveStatus();
      els.imageStatus.textContent = "Loading uploads...";
      const urls = await Promise.all(files.map(fileToDataUrl));
      setActiveImages("", urls, "file");
      els.imageUrl.value = "";
      renderImageStage(getActiveNote());
      updatePreview();
      renderNoteList();
      els.imageStatus.textContent = `${urls.length}枚の画像をアップロードしました`;
      scheduleGoogleSync();
    }

    function getSharedPayload() {
      const params = new URLSearchParams(location.search);
      const sharedUrl = params.get("url") || "";
      const sharedText = params.get("text") || "";
      const sharedTitle = params.get("title") || "";
      const imageCandidate = sharedUrl || (sharedText.match(/https?:\/\/\S+/)?.[0] ?? "");

      if (!sharedUrl && !sharedText && !sharedTitle) return null;
      return {
        url: imageCandidate,
        text: [sharedTitle, sharedText].filter(Boolean).join("\n").trim()
      };
    }

    function createNoteFromShare(payload) {
      const date = nowISO();
      const note = {
        id: uid(),
        title: "",
        imageUrl: payload.url,
        resolvedImageUrl: "",
        images: [],
        firstImpression: payload.text,
        composition: "",
        color: "",
        other: "",
        createdAt: date,
        updatedAt: date
      };

      notes.unshift(note);
      activeId = note.id;
      dirty = true;
      persistNotes();
      render();
      scheduleGoogleSync();

      if (payload.url) {
        els.imageUrl.value = payload.url;
        resolveCurrentUrlImages();
      }

      history.replaceState(null, "", location.pathname);
    }

    function handleIncomingShare() {
      const payload = getSharedPayload();
      if (!payload) return false;
      createNoteFromShare(payload);
      return true;
    }

    function fillText(el, value) {
      el.textContent = value || "No entry";
      el.classList.toggle("empty", !value);
    }

    function updatePreview() {
      renderImageStage(getActiveNote());
    }

    function switchMode() {
      mode = "edit";
      els.editor.classList.remove("hidden");
      els.editOnly.forEach(el => el.classList.remove("hidden"));
    }

    function setSidebarCollapsed(collapsed) {
      els.app.classList.toggle("sidebar-collapsed", collapsed);
      els.sidebarToggle.textContent = collapsed ? ">" : "<";
      els.sidebarToggle.setAttribute("aria-label", collapsed ? "Show notes" : "Hide notes");
      localStorage.setItem(SIDEBAR_COLLAPSED_KEY, collapsed ? "1" : "0");
    }

    function updateGoogleStatus(text) {
      els.googleStatus.textContent = text;
    }

    function initGoogleAuth() {
      if (!GOOGLE_CLIENT_ID) {
        updateGoogleStatus("GOOGLE: CLIENT ID REQUIRED");
        els.googleAuthBtn.disabled = true;
        return;
      }

      if (!window.google?.accounts?.oauth2) {
        updateGoogleStatus("GOOGLE: LOADING");
        setTimeout(initGoogleAuth, 500);
        return;
      }

      googleTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: GOOGLE_DRIVE_SCOPE,
        include_granted_scopes: true,
        callback: tokenResponse => {
          if (tokenResponse?.access_token) {
            googleAccessToken = tokenResponse.access_token;
            updateGoogleStatus("GOOGLE: SIGNED IN");
            if (pendingGoogleSave) {
              pendingGoogleSave = false;
              syncToGoogleDrive();
            } else {
              loadFromGoogleDrive();
            }
          } else {
            updateGoogleStatus("GOOGLE: LOGIN FAILED");
          }
        }
      });

      els.googleAuthBtn.disabled = false;
      updateGoogleStatus("GOOGLE: READY");
    }

    function requestGoogleLogin(forceConsent = false) {
      if (!googleTokenClient) {
        initGoogleAuth();
        return;
      }

      googleTokenClient.requestAccessToken({ prompt: forceConsent ? "consent" : "" });
    }

    async function findGoogleNotesFile() {
      const query = encodeURIComponent("name = 'study-notes.json' and trashed = false");
      const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&spaces=drive&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc`, {
        headers: {
          Authorization: "Bearer " + googleAccessToken
        }
      });

      if (!response.ok) throw new Error("drive list failed");
      const data = await response.json();
      return data.files?.[0] ?? null;
    }

    async function uploadGoogleNotesFile(fileId = "") {
      const metadata = {
        name: "study-notes.json",
        mimeType: "application/json"
      };
      const boundary = "study-notes-boundary-" + Date.now();
      const body = [
        `--${boundary}`,
        "Content-Type: application/json; charset=UTF-8",
        "",
        JSON.stringify(metadata),
        `--${boundary}`,
        "Content-Type: application/json; charset=UTF-8",
        "",
        JSON.stringify(notes, null, 2),
        `--${boundary}--`
      ].join("\r\n");

      const endpoint = fileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
        : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";

      return fetch(endpoint, {
        method: fileId ? "PATCH" : "POST",
        headers: {
          Authorization: "Bearer " + googleAccessToken,
          "Content-Type": "multipart/related; boundary=" + boundary
        },
        body
      });
    }

    async function downloadGoogleNotesFile(fileId) {
      const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: {
          Authorization: "Bearer " + googleAccessToken
        }
      });

      if (!response.ok) throw new Error("drive download failed");
      return response.json();
    }

    async function loadFromGoogleDrive() {
      if (!googleAccessToken) {
        updateGoogleStatus("GOOGLE: LOGIN REQUIRED");
        requestGoogleLogin();
        return;
      }

      try {
        updateGoogleStatus("GOOGLE: LOADING");
        const existing = await findGoogleNotesFile();
        if (!existing) {
          updateGoogleStatus("GOOGLE: NO CLOUD DATA");
          return;
        }

        const remoteNotes = await downloadGoogleNotesFile(existing.id);
        if (!Array.isArray(remoteNotes)) throw new Error("invalid notes");

        notes = normalizeNotes(remoteNotes);
        activeId = notes[0]?.id ?? null;
        dirty = false;
        persistNotes();
        render();
        updateGoogleStatus("GOOGLE: LOADED");
      } catch {
        updateGoogleStatus("GOOGLE: LOAD FAILED");
      }
    }

    async function syncToGoogleDrive() {
      if (!googleAccessToken) {
        pendingGoogleSave = true;
        updateGoogleStatus("GOOGLE: LOGIN REQUIRED");
        requestGoogleLogin();
        return;
      }

      if (googleSyncInFlight) {
        pendingGoogleSave = true;
        return;
      }

      try {
        googleSyncInFlight = true;
        const current = readForm();
        if (current) {
          current.updatedAt = nowISO();
          notes = notes.map(note => note.id === current.id ? current : note);
          dirty = false;
          persistNotes();
          updateSaveStatus();
          renderNoteList();
          els.updatedAt.textContent = `Updated: ${formatDate(current.updatedAt)}`;
        }
        updateGoogleStatus("GOOGLE: SYNCING");
        const existing = await findGoogleNotesFile();
        const response = await uploadGoogleNotesFile(existing?.id ?? "");
        if (response.status === 401 || response.status === 403) {
          googleAccessToken = "";
          pendingGoogleSave = true;
          updateGoogleStatus("GOOGLE: LOGIN REQUIRED");
        } else {
          updateGoogleStatus(response.ok ? "GOOGLE: SYNCED" : "GOOGLE: SYNC FAILED");
        }
      } catch {
        updateGoogleStatus("GOOGLE: SYNC FAILED");
      } finally {
        googleSyncInFlight = false;
        if (pendingGoogleSave && googleAccessToken) {
          pendingGoogleSave = false;
          scheduleGoogleSync();
        }
      }
    }

    function scheduleGoogleSync() {
      clearTimeout(googleSyncTimer);
      if (!googleAccessToken) {
        pendingGoogleSave = true;
        updateGoogleStatus("GOOGLE: LOGIN REQUIRED");
        return;
      }

      updateGoogleStatus("GOOGLE: WAITING");
      googleSyncTimer = setTimeout(syncToGoogleDrive, 1200);
    }

    async function saveToGoogleDrive() {
      const current = readForm();
      if (current) {
        current.updatedAt = nowISO();
        notes = notes.map(note => note.id === current.id ? current : note);
        persistNotes();
        dirty = false;
        updateSaveStatus();
        render();
      }

      await syncToGoogleDrive();
    }

    function render() {
      if (notes.length === 0) {
        createNote();
        return;
      }

      const note = getActiveNote();
      writeForm(note);
      renderNoteList();
      renderImageStage(note);
      updatePreview();
      updateSaveStatus();
      switchMode(mode);
      els.updatedAt.textContent = `Updated: ${formatDate(note?.updatedAt)}`;
    }

    [els.firstImpression, els.composition, els.color, els.other].forEach(input => {
      input.addEventListener("input", () => {
        resizeTextarea(input);
        markDirty();
      });
    });

    els.imageUrl.addEventListener("input", scheduleImageResolve);
    els.fileInput.addEventListener("change", handleFileUpload);

    els.newBtn.addEventListener("click", async () => {
      if (dirty && !await askConfirm("未保存の変更を破棄して新規ノートを作成しますか？", "作成")) return;
      if (dirty) restoreCleanNotes();
      createNote();
    });
    els.saveBtn.addEventListener("click", saveNote);
    els.deleteBtn.addEventListener("click", deleteNote);
    els.confirmCancel.addEventListener("click", () => closeConfirm(false));
    els.confirmOk.addEventListener("click", () => closeConfirm(true));
    els.confirmModal.addEventListener("click", event => {
      if (event.target === els.confirmModal) closeConfirm(false);
    });
    els.sidebarToggle.addEventListener("click", () => {
      setSidebarCollapsed(!els.app.classList.contains("sidebar-collapsed"));
    });
    els.app.addEventListener("click", event => {
      if (els.app.classList.contains("sidebar-collapsed")) return;
      if (event.target.closest(".sidebar-toggle, .brand, .toolbar, .note-list")) return;
      setSidebarCollapsed(true);
    });
    els.lightboxClose.addEventListener("click", closeLightbox);
    els.lightbox.addEventListener("click", event => {
      if (event.target === els.lightbox) closeLightbox();
    });
    els.googleAuthBtn.addEventListener("click", () => requestGoogleLogin(false));

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !els.lightbox.classList.contains("hidden")) {
        closeLightbox();
      }

      if (event.key === "Escape" && !els.confirmModal.classList.contains("hidden")) {
        closeConfirm(false);
      }

      const isSave = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s";
      if (isSave) {
        event.preventDefault();
        saveNote();
      }
    });

    window.addEventListener("beforeunload", event => {
      if (!dirty) return;
      event.preventDefault();
      event.returnValue = "";
    });

    updateClock();
    setInterval(updateClock, 1000);
    resizeTextareas();
    setSidebarCollapsed(localStorage.getItem(SIDEBAR_COLLAPSED_KEY) === "1");
    initGoogleAuth();
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("study-note-sw.js").catch(() => {});
    }

    if (!handleIncomingShare()) {
      if (notes.length === 0) createNote();
      else render();
    }
  </script>
</body>
</html>
